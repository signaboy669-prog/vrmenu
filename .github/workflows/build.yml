name: Build C++ Library

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure CMake (MSVC)
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
      
      - name: Build (Release)
        run: |
          cd build
          cmake --build . --config Release
      
      - name: Run tests
        run: |
          cd build
          Release\test_app.exe
      
      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: vrmenu-windows-x64
          path: build/Release/vrmenu.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake
      
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake ..
      
      - name: Build (Release)
        run: |
          cd build
          cmake --build . --config Release
      
      - name: Run tests
        run: |
          cd build
          ./test_app
      
      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: vrmenu-linux-x64
          path: build/libvrmenu.so

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      
      - name: Configure CMake (ARM64)
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
      
      - name: Build (Release)
        run: |
          cd build
          cmake --build . --config Release
      
      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: vrmenu-linux-arm64
          path: build/libvrmenu.so
